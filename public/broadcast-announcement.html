<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Broadcast & Announcement - Discord Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .navbar {
            background: rgba(15, 12, 41, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .navbar-content {
            max-width: 7xl;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(120deg, #58a6ff 0%, #9370db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        .back-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: #58a6ff;
            background: rgba(88, 166, 255, 0.2);
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-logout {
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            min-height: 44px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.3);
            border-color: rgba(239, 68, 68, 1);
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: #58a6ff;
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(88, 166, 255, 0.2);
            padding-bottom: 15px;
            overflow-x: auto;
        }

        .tab-button {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            min-height: 44px;
            display: flex;
            align-items: center;
        }

        .tab-button.active {
            color: #58a6ff;
            border-bottom-color: #58a6ff;
        }

        .tab-button:hover {
            color: #58a6ff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.1);
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
            font-family: 'Poppins', sans-serif;
        }

        .form-select {
            cursor: pointer;
        }

        .form-select option {
            background: #0f0c29;
            color: white;
        }

        .color-picker-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-picker {
            width: 50px;
            height: 44px;
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 10px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
        }

        .color-input {
            flex: 1;
        }

        .btn-submit,
        .btn-preview {
            padding: 12px 40px;
            background: linear-gradient(120deg, #58a6ff 0%, #6c5ce7 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(88, 166, 255, 0.4);
            min-height: 44px;
            min-width: 100px;
        }

        .btn-submit:hover,
        .btn-preview:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(88, 166, 255, 0.6);
        }

        .btn-preview {
            background: linear-gradient(120deg, #9370db 0%, #58a6ff 100%);
            margin-left: 10px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .preview-box {
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            min-height: 200px;
        }

        .preview-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #58a6ff;
        }

        .preview-content {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            word-break: break-word;
        }

        .embed-preview {
            background: rgba(88, 166, 255, 0.15);
            border-left: 4px solid #58a6ff;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .server-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
        }

        .server-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .server-item:hover {
            border-color: rgba(88, 166, 255, 0.6);
            background: rgba(88, 166, 255, 0.1);
        }

        .server-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #58a6ff;
        }

        .server-info {
            flex: 1;
        }

        .server-name {
            font-weight: 600;
            color: #58a6ff;
        }

        .server-members {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .channel-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
        }

        .channel-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            flex-direction: column;
        }

        .channel-item:hover {
            border-color: rgba(88, 166, 255, 0.6);
            background: rgba(88, 166, 255, 0.1);
        }

        .channel-item.selected {
            background: rgba(88, 166, 255, 0.2);
            border-color: #58a6ff;
        }

        .channel-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #58a6ff;
        }

        .channel-name {
            font-weight: 600;
            color: #58a6ff;
            font-size: 0.9rem;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #86efac;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
        }

        .alert.info {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.5);
            color: #bfdbfe;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.95rem;
        }

        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(88, 166, 255, 0.2);
        }

        .history-table th {
            background: rgba(88, 166, 255, 0.1);
            font-weight: 600;
            color: #58a6ff;
        }

        .history-table td {
            color: rgba(255, 255, 255, 0.8);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-sent {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .status-failed {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .selected-count {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 10px;
        }

        .embed-toggle {
            background: rgba(88, 166, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .embed-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(88, 166, 255, 0.2);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #9370db;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .checkbox-group:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #58a6ff;
        }

        .checkbox-label {
            flex: 1;
            font-weight: 500;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: rgba(15, 12, 41, 0.95);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #58a6ff;
        }

        .modal-close {
            background: rgba(239, 68, 68, 0.2);
            border: none;
            color: #fca5a5;
            font-size: 1.5rem;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .card {
                padding: 25px;
            }

            .card-title {
                font-size: 1.3rem;
            }

            .server-list,
            .channel-list {
                max-height: 200px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-submit,
            .btn-preview {
                width: 100%;
            }

            .history-table {
                font-size: 0.85rem;
            }

            .history-table th,
            .history-table td {
                padding: 8px;
            }

            .modal-content {
                padding: 20px;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 0 15px;
            }

            .card {
                padding: 20px;
            }

            .tabs {
                gap: 8px;
            }

            .tab-button {
                padding: 8px 12px;
                font-size: 0.9rem;
            }

            .channel-list {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-left">
                <div class="logo">📢 Broadcast & Announcement</div>
            </div>
            <div class="navbar-right">
                <a href="/admin" class="back-link">← กลับไปหน้า Admin</a>
                <button class="btn-logout" onclick="logout()" title="Logout">
                    🚪
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Alert -->
        <div id="alert" class="alert"></div>

        <!-- Main Card -->
        <div class="card">
            <div class="tabs">
                <button class="tab-button active" onclick="switchTab(event, 'broadcast')">📢 ส่งข้อความ</button>
                <button class="tab-button" onclick="switchTab(event, 'announcement')">📝 โพสต์ประกาศ</button>
                <button class="tab-button" onclick="switchTab(event, 'history')">📜 ประวัติ</button>
            </div>

            <!-- Tab 1: Broadcast Messages -->
            <div id="broadcast" class="tab-content active">
                <div class="card-title">📢 ส่งข้อความไปยังช่องใน Discord</div>
                
                <form id="broadcastForm">
                    <!-- Select Servers -->
                    <div class="form-group">
                        <label class="form-label">1️⃣ เลือกเซิร์ฟเวอร์</label>
                        <div id="serverList" class="server-list">
                            <div style="text-align: center; padding: 40px; grid-column: 1/-1;">
                                <div style="font-size: 2rem; margin-bottom: 10px;">⏳</div>
                                <div style="color: rgba(255, 255, 255, 0.7);">กำลังโหลดเซิร์ฟเวอร์...</div>
                            </div>
                        </div>
                        <div class="selected-count" id="serverCount"></div>
                    </div>

                    <!-- Select Channels -->
                    <div class="form-group">
                        <label class="form-label">2️⃣ เลือกช่อง (Channels)</label>
                        <div id="channelList" class="channel-list">
                            <div style="text-align: center; padding: 40px; grid-column: 1/-1;">
                                <div style="font-size: 1.5rem; margin-bottom: 10px;">⏳</div>
                                <div style="color: rgba(255, 255, 255, 0.7);">เลือกเซิร์ฟเวอร์ก่อน</div>
                            </div>
                        </div>
                        <div class="selected-count" id="channelCount"></div>
                    </div>

                    <!-- Message Type Toggle -->
                    <div class="embed-toggle">
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 15px;">
                            <input type="radio" name="messageType" value="text" checked onchange="toggleMessageType()" style="width: 18px; height: 18px; cursor: pointer; accent-color: #58a6ff;">
                            <span style="font-weight: 600;">💬 ข้อความธรรมดา</span>
                        </label>

                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="radio" name="messageType" value="embed" onchange="toggleMessageType()" style="width: 18px; height: 18px; cursor: pointer; accent-color: #58a6ff;">
                            <span style="font-weight: 600;">🎨 Embed Message (ตกแต่ง)</span>
                        </label>
                    </div>

                    <!-- Text Message Section -->
                    <div id="textMessageSection">
                        <div class="form-group">
                            <label class="form-label">3️⃣ ข้อความ</label>
                            <textarea 
                                id="broadcastMessage" 
                                class="form-textarea" 
                                placeholder="พิมพ์ข้อความที่ต้องการส่ง..."
                            ></textarea>
                        </div>
                    </div>

                    <!-- Embed Message Section -->
                    <div id="embedMessageSection" style="display: none;">
                        <div class="form-group">
                            <button type="button" class="btn-submit" style="background: linear-gradient(120deg, #9370db 0%, #58a6ff 100%); width: 100%;" onclick="openEmbedBuilder()">
                                🎨 เปิด Embed Builder
                            </button>
                        </div>

                        <div class="preview-box" id="embedPreview" style="display: none;">
                            <div class="preview-title">👁️ ตัวอย่าง Embed</div>
                            <div id="embedPreviewContent" class="preview-content"></div>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="button-group" style="margin-top: 30px;">
                        <button type="submit" class="btn-submit">
                            <span id="submitText">📢 ส่งข้อความ</span>
                            <span id="spinner" class="loading" style="display: none;"></span>
                        </button>
                    </div>
                </form>
            </div>

            <!-- Tab 2: Announcements -->
            <div id="announcement" class="tab-content">
                <div class="card-title">📝 โพสต์ประกาศ</div>
                
                <form id="announcementForm">
                    <!-- Select Channel -->
                    <div class="form-group">
                        <label class="form-label">เลือกช่อง (Channel)</label>
                        <select id="announcementChannel" class="form-select" required>
                            <option value="">-- เลือกช่อง --</option>
                        </select>
                    </div>

                    <!-- Message Type Toggle -->
                    <div class="embed-toggle">
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 15px;">
                            <input type="radio" name="announcementType" value="text" checked onchange="toggleAnnouncementType()" style="width: 18px; height: 18px; cursor: pointer; accent-color: #58a6ff;">
                            <span style="font-weight: 600;">💬 ข้อความธรรมดา</span>
                        </label>

                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="radio" name="announcementType" value="embed" onchange="toggleAnnouncementType()" style="width: 18px; height: 18px; cursor: pointer; accent-color: #58a6ff;">
                            <span style="font-weight: 600;">🎨 Embed Message (ตกแต่ง)</span>
                        </label>
                    </div>

                    <!-- Text Mode -->
                    <div id="announcementTextSection">
                        <div class="form-group">
                            <label class="form-label">หัวข้อประกาศ</label>
                            <input 
                                type="text" 
                                id="announcementTitle" 
                                class="form-input" 
                                placeholder="ชื่อประกาศ"
                            >
                        </div>

                        <div class="form-group">
                            <label class="form-label">เนื้อหา</label>
                            <textarea 
                                id="announcementContent" 
                                class="form-textarea" 
                                placeholder="พิมพ์เนื้อหาประกาศ..."
                            ></textarea>
                        </div>
                    </div>

                    <!-- Embed Mode -->
                    <div id="announcementEmbedSection" style="display: none;">
                        <div class="form-group">
                            <button type="button" class="btn-submit" style="background: linear-gradient(120deg, #9370db 0%, #58a6ff 100%); width: 100%;" onclick="openEmbedBuilderAnnouncement()">
                                🎨 เปิด Embed Builder
                            </button>
                        </div>

                        <div class="preview-box" id="announcementEmbedPreview" style="display: none;">
                            <div class="preview-title">👁️ ตัวอย่าง Embed</div>
                            <div id="announcementEmbedPreviewContent" class="preview-content"></div>
                        </div>
                    </div>

                    <!-- Schedule -->
                    <div class="form-group">
                        <label class="form-label">ส่งเลยหรือตั้งเวลา?</label>
                        <select id="scheduleType" class="form-select" onchange="toggleScheduleTime()">
                            <option value="now">ส่งเลยตอนนี้</option>
                            <option value="schedule">ตั้งเวลาส่ง</option>
                        </select>
                    </div>

                    <div id="scheduleTime" class="form-group" style="display: none;">
                        <label class="form-label">เวลาที่ต้องการส่ง</label>
                        <input type="datetime-local" id="announcementTime" class="form-input">
                    </div>

                    <!-- Buttons -->
                    <div class="button-group" style="margin-top: 30px;">
                        <button type="submit" class="btn-submit">
                            <span id="announcementSubmitText">📝 โพสต์ประกาศ</span>
                            <span id="announcementSpinner" class="loading" style="display: none;"></span>
                        </button>
                    </div>
                </form>
            </div>

            <!-- Tab 3: History -->
            <div id="history" class="tab-content">
                <div class="card-title">📜 ประวัติการส่ง</div>
                
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>ประเภท</th>
                            <th>ปลายทาง</th>
                            <th>ข้อความ</th>
                            <th>เวลา</th>
                            <th>สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 30px;">
                                <div style="font-size: 1.5rem;">📭</div>
                                <div style="color: rgba(255, 255, 255, 0.7);">ยังไม่มีประวัติ</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Embed Builder Modal -->
    <div id="embedBuilderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">🎨 Embed Builder</div>
                <button class="modal-close" onclick="closeEmbedBuilder()">×</button>
            </div>

            <!-- Embed Builder Form (Simplified) -->
            <div class="form-group">
                <label class="form-label">📝 ชื่อเรื่อง (Title)</label>
                <input type="text" id="modalEmbedTitle" class="form-input" placeholder="ชื่อของ Embed" maxlength="256" oninput="updateModalPreview()">
            </div>

            <div class="form-group">
                <label class="form-label">📄 คำอธิบาย (Description)</label>
                <textarea id="modalEmbedDescription" class="form-textarea" placeholder="คำอธิบาย" maxlength="4096" oninput="updateModalPreview()" style="min-height: 100px;"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">🎨 สี (Color)</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="modalEmbedColor" class="color-picker" value="#58a6ff" oninput="syncModalColorInput(); updateModalPreview()">
                    <input type="text" id="modalColorHex" class="form-input color-input" value="#58a6ff" placeholder="#58a6ff" oninput="syncModalColorPicker(); updateModalPreview()">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">🖼️ รูปภาพ (Image URL)</label>
                <input type="url" id="modalEmbedImage" class="form-input" placeholder="https://example.com/image.png" oninput="updateModalPreview()">
            </div>

            <div class="form-group">
                <label class="form-label">🔚 ข้อความส่วนท้าย (Footer)</label>
                <input type="text" id="modalEmbedFooter" class="form-input" placeholder="Footer text" maxlength="2048" oninput="updateModalPreview()">
            </div>

            <!-- Preview -->
            <div class="preview-box" style="margin-top: 20px;">
                <div class="preview-title">👁️ ตัวอย่าง</div>
                <div id="modalEmbedPreview" class="preview-content" style="min-height: 150px;">
                    (ตัวอย่างจะแสดงที่นี่)
                </div>
            </div>

            <!-- Buttons -->
            <div class="button-group" style="margin-top: 20px;">
                <button type="button" class="btn-submit" style="flex: 1;" onclick="confirmEmbed()">
                    ✅ ยืนยัน
                </button>
                <button type="button" class="btn-preview" style="flex: 1;" onclick="closeEmbedBuilder()">
                    ❌ ยกเลิก
                </button>
            </div>
        </div>
    </div>

    <script>
        let broadcastHistory = [];
        let serverData = [];
        let allChannels = [];
        let selectedChannels = [];
        let currentEmbedData = null;
        let embedMode = 'broadcast'; // broadcast or announcement

        // Auth Check
        async function checkAuth() {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = '/login';
                return;
            }

            try {
                const response = await fetch('/api/verify-token', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (!data.valid) {
                    localStorage.removeItem('authToken');
                    window.location.href = '/login';
                }
            } catch (error) {
                window.location.href = '/login';
            }
        }

        function logout() {
            localStorage.removeItem('authToken');
            window.location.href = '/login';
        }

        function getAuthToken() {
            return localStorage.getItem('authToken');
        }

        // Switch Tabs
        function switchTab(e, tabName) {
            e.preventDefault();
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            e.target.classList.add('active');
        }

        // Show Alert
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert ${type}`;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 5000);
        }

        // Load Servers
        async function loadServers() {
            try {
                const response = await fetch('/api/admin/guild-info', {
                    headers: { 'Authorization': `Bearer ${getAuthToken()}` }
                });
                const data = await response.json();
                serverData = data.guilds;

                const html = serverData.map(guild => `
                    <div class="server-item" onclick="onServerSelect('${guild.id}')">
                        <input type="checkbox" class="server-checkbox" value="${guild.id}" onchange="onServerCheckboxChange()">
                        <div class="server-info">
                            <div class="server-name">${guild.name}</div>
                            <div class="server-members">👥 ${guild.memberCount}</div>
                        </div>
                    </div>
                `).join('');

                document.getElementById('serverList').innerHTML = html;

                // Load channels
                const channels = await fetch('/api/admin/channels', {
                    headers: { 'Authorization': `Bearer ${getAuthToken()}` }
                }).then(r => r.json()).catch(() => ({ channels: [] }));

                allChannels = channels.channels || [];

                const channelSelect = document.getElementById('announcementChannel');
                allChannels.forEach(ch => {
                    const option = document.createElement('option');
                    option.value = ch.id;
                    option.textContent = `#${ch.name} (${ch.guildName})`;
                    channelSelect.appendChild(option);
                });
            } catch (error) {
                showAlert('❌ ไม่สามารถโหลดเซิร์ฟเวอร์ได้', 'error');
            }
        }

        // Server Selection
        function onServerSelect(serverId) {
            const checkbox = document.querySelector(`.server-checkbox[value="${serverId}"]`);
            checkbox.checked = !checkbox.checked;
            onServerCheckboxChange();
        }

        function onServerCheckboxChange() {
            const selectedServers = Array.from(document.querySelectorAll('.server-checkbox:checked')).map(el => el.value);
            
            document.getElementById('serverCount').textContent = selectedServers.length > 0 
                ? `✅ เลือก ${selectedServers.length} เซิร์ฟเวอร์` 
                : '';

            if (selectedServers.length === 0) {
                document.getElementById('channelList').innerHTML = `
                    <div style="text-align: center; padding: 40px; grid-column: 1/-1;">
                        <div style="font-size: 1.5rem;">⏳</div>
                        <div style="color: rgba(255, 255, 255, 0.7);">เลือกเซิร์ฟเวอร์ก่อน</div>
                    </div>
                `;
                selectedChannels = [];
                document.getElementById('channelCount').textContent = '';
                return;
            }

            const serverChannels = allChannels.filter(ch => selectedServers.includes(ch.guildId));
            
            if (serverChannels.length === 0) {
                document.getElementById('channelList').innerHTML = `
                    <div style="text-align: center; padding: 40px; grid-column: 1/-1;">
                        <div style="font-size: 1.5rem;">📭</div>
                        <div style="color: rgba(255, 255, 255, 0.7);">ไม่มีช่องในเซิร์ฟเวอร์นี้</div>
                    </div>
                `;
                selectedChannels = [];
                document.getElementById('channelCount').textContent = '';
                return;
            }

            const html = serverChannels.map(ch => `
                <div class="channel-item" id="ch-${ch.id}" onclick="toggleChannel('${ch.id}')">
                    <input type="checkbox" class="channel-checkbox" value="${ch.id}" onchange="updateChannelCount()">
                    <div class="channel-name">#${ch.name}</div>
                    <div style="font-size: 0.75rem; color: rgba(255, 255, 255, 0.5);">${ch.guildName}</div>
                </div>
            `).join('');

            document.getElementById('channelList').innerHTML = html;
            selectedChannels = [];
            document.getElementById('channelCount').textContent = '';
        }

        function toggleChannel(channelId) {
            const checkbox = document.querySelector(`.channel-checkbox[value="${channelId}"]`);
            checkbox.checked = !checkbox.checked;
            updateChannelCount();
        }

        function updateChannelCount() {
            selectedChannels = Array.from(document.querySelectorAll('.channel-checkbox:checked')).map(el => el.value);
            
            document.querySelectorAll('.channel-item').forEach(item => {
                const checkbox = item.querySelector('.channel-checkbox');
                if (checkbox.checked) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });

            document.getElementById('channelCount').textContent = selectedChannels.length > 0 
                ? `✅ เลือก ${selectedChannels.length} ช่อง` 
                : '';
        }

        // Message Type Toggle
        function toggleMessageType() {
            const messageType = document.querySelector('input[name="messageType"]:checked').value;
            document.getElementById('textMessageSection').style.display = messageType === 'text' ? 'block' : 'none';
            document.getElementById('embedMessageSection').style.display = messageType === 'embed' ? 'block' : 'none';
        }

        function toggleAnnouncementType() {
            const announcementType = document.querySelector('input[name="announcementType"]:checked').value;
            document.getElementById('announcementTextSection').style.display = announcementType === 'text' ? 'block' : 'none';
            document.getElementById('announcementEmbedSection').style.display = announcementType === 'embed' ? 'block' : 'none';
        }

        // Embed Builder Modal
        function openEmbedBuilder() {
            embedMode = 'broadcast';
            currentEmbedData = null;
            document.getElementById('modalEmbedTitle').value = '';
            document.getElementById('modalEmbedDescription').value = '';
            document.getElementById('modalEmbedColor').value = '#58a6ff';
            document.getElementById('modalColorHex').value = '#58a6ff';
            document.getElementById('modalEmbedImage').value = '';
            document.getElementById('modalEmbedFooter').value = '';
            updateModalPreview();
            document.getElementById('embedBuilderModal').classList.add('active');
        }

        function openEmbedBuilderAnnouncement() {
            embedMode = 'announcement';
            currentEmbedData = null;
            document.getElementById('modalEmbedTitle').value = '';
            document.getElementById('modalEmbedDescription').value = '';
            document.getElementById('modalEmbedColor').value = '#58a6ff';
            document.getElementById('modalColorHex').value = '#58a6ff';
            document.getElementById('modalEmbedImage').value = '';
            document.getElementById('modalEmbedFooter').value = '';
            updateModalPreview();
            document.getElementById('embedBuilderModal').classList.add('active');
        }

        function closeEmbedBuilder() {
            document.getElementById('embedBuilderModal').classList.remove('active');
        }

        // Color Sync
        function syncModalColorInput() {
            document.getElementById('modalColorHex').value = document.getElementById('modalEmbedColor').value;
        }

        function syncModalColorPicker() {
            const hex = document.getElementById('modalColorHex').value;
            if (/^#[0-9A-F]{6}$/i.test(hex)) {
                document.getElementById('modalEmbedColor').value = hex;
            }
        }

        // Update Modal Preview
        function updateModalPreview() {
            const title = document.getElementById('modalEmbedTitle').value;
            const description = document.getElementById('modalEmbedDescription').value;
            const color = document.getElementById('modalEmbedColor').value;
            const image = document.getElementById('modalEmbedImage').value;
            const footer = document.getElementById('modalEmbedFooter').value;
            const preview = document.getElementById('modalEmbedPreview');

            if (!title && !description) {
                preview.innerHTML = '(สิ่งที่คุณสร้างจะปรากฏตรงนี้)';
                return;
            }

            let html = '<div class="embed-preview" style="border-left-color: ' + color + '; border-left-width: 4px;">';
            if (title) html += '<strong style="font-size: 1.1rem;">' + title + '</strong><br>';
            if (description) html += '<div style="margin-top: 8px;">' + description + '</div>';
            if (image) html += '<div style="margin-top: 12px;"><img src="' + image + '" style="max-width: 100%; border-radius: 4px;" alt="image"></div>';
            if (footer) html += '<div style="margin-top: 12px; font-size: 0.85rem; color: rgba(255, 255, 255, 0.7);">' + footer + '</div>';
            html += '</div>';

            preview.innerHTML = html;
        }

        // Confirm Embed
        function confirmEmbed() {
            currentEmbedData = {
                title: document.getElementById('modalEmbedTitle').value,
                description: document.getElementById('modalEmbedDescription').value,
                color: document.getElementById('modalEmbedColor').value,
                image: document.getElementById('modalEmbedImage').value,
                footer: document.getElementById('modalEmbedFooter').value
            };

            if (embedMode === 'broadcast') {
                const previewHtml = document.getElementById('modalEmbedPreview').innerHTML;
                document.getElementById('embedPreviewContent').innerHTML = previewHtml;
                document.getElementById('embedPreview').style.display = 'block';
            } else if (embedMode === 'announcement') {
                const previewHtml = document.getElementById('modalEmbedPreview').innerHTML;
                document.getElementById('announcementEmbedPreviewContent').innerHTML = previewHtml;
                document.getElementById('announcementEmbedPreview').style.display = 'block';
            }

            closeEmbedBuilder();
        }

        // Handle Broadcast Form
        document.getElementById('broadcastForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const selectedServers = Array.from(document.querySelectorAll('.server-checkbox:checked')).map(el => el.value);
            
            if (selectedServers.length === 0) {
                showAlert('❌ กรุณาเลือกเซิร์ฟเวอร์อย่างน้อย 1 เซิร์ฟเวอร์', 'error');
                return;
            }

            if (selectedChannels.length === 0) {
                showAlert('❌ กรุณาเลือกช่องอย่างน้อย 1 ช่อง', 'error');
                return;
            }

            const messageType = document.querySelector('input[name="messageType"]:checked').value;
            let message = '';
            let useEmbed = false;
            let embedData = null;

            if (messageType === 'text') {
                message = document.getElementById('broadcastMessage').value;
                if (!message) {
                    showAlert('❌ กรุณากรอกข้อความ', 'error');
                    return;
                }
            } else {
                if (!currentEmbedData) {
                    showAlert('❌ กรุณาสร้าง Embed ก่อน', 'error');
                    return;
                }
                useEmbed = true;
                embedData = currentEmbedData;
            }

            document.getElementById('submitText').style.display = 'none';
            document.getElementById('spinner').style.display = 'inline-block';

            try {
                const response = await fetch('/api/admin/broadcast', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getAuthToken()}`
                    },
                    body: JSON.stringify({
                        serverIds: selectedServers,
                        channelIds: selectedChannels,
                        message,
                        useEmbed,
                        embedData
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    showAlert('✅ ส่งข้อความสำเร็จ!', 'success');
                    document.getElementById('broadcastForm').reset();
                    document.getElementById('embedPreview').style.display = 'none';
                    currentEmbedData = null;
                    toggleMessageType();
                } else {
                    showAlert('❌ ' + (data.error || 'เกิดข้อผิดพลาด'), 'error');
                }
            } catch (error) {
                showAlert('❌ เกิดข้อผิดพลาด: ' + error.message, 'error');
            } finally {
                document.getElementById('submitText').style.display = 'inline';
                document.getElementById('spinner').style.display = 'none';
            }
        });

        // Handle Announcement Form
        document.getElementById('announcementForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const channelId = document.getElementById('announcementChannel').value;
            if (!channelId) {
                showAlert('❌ กรุณาเลือกช่อง', 'error');
                return;
            }

            const announcementType = document.querySelector('input[name="announcementType"]:checked').value;
            let title = '';
            let content = '';
            let useEmbed = false;
            let embedData = null;

            if (announcementType === 'text') {
                title = document.getElementById('announcementTitle').value;
                content = document.getElementById('announcementContent').value;
                if (!title || !content) {
                    showAlert('❌ กรุณากรอกหัวข้อและเนื้อหา', 'error');
                    return;
                }
            } else {
                if (!currentEmbedData) {
                    showAlert('❌ กรุณาสร้าง Embed ก่อน', 'error');
                    return;
                }
                useEmbed = true;
                embedData = currentEmbedData;
            }

            document.getElementById('announcementSubmitText').style.display = 'none';
            document.getElementById('announcementSpinner').style.display = 'inline-block';

            try {
                const response = await fetch('/api/admin/announcement', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getAuthToken()}`
                    },
                    body: JSON.stringify({
                        channelId,
                        title,
                        content,
                        useEmbed,
                        embedData,
                        schedule: document.getElementById('scheduleType').value === 'schedule' ? 
                            document.getElementById('announcementTime').value : null
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    showAlert('✅ โพสต์ประกาศสำเร็จ!', 'success');
                    document.getElementById('announcementForm').reset();
                    document.getElementById('announcementEmbedPreview').style.display = 'none';
                    currentEmbedData = null;
                    toggleAnnouncementType();
                } else {
                    showAlert('❌ ' + (data.error || 'เกิดข้อผิดพลาด'), 'error');
                }
            } catch (error) {
                showAlert('❌ เกิดข้อผิดพลาด: ' + error.message, 'error');
            } finally {
                document.getElementById('announcementSubmitText').style.display = 'inline';
                document.getElementById('announcementSpinner').style.display = 'none';
            }
        });

        function toggleScheduleTime() {
            const scheduleTime = document.getElementById('scheduleTime');
            scheduleTime.style.display = document.getElementById('scheduleType').value === 'schedule' ? 'block' : 'none';
        }

        // Initialize
        checkAuth();
        loadServers();
    </script>
</body>
</html>
