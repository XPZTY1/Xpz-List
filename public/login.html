<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Login - Discord Bot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(88, 166, 255, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(147, 112, 219, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 0 20px;
        }

        .login-card {
            background: rgba(15, 12, 41, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 25px;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .login-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(120deg, #58a6ff 0%, #9370db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-input:focus {
            outline: none;
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.12);
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.3);
        }

        .form-input:hover {
            border-color: rgba(88, 166, 255, 0.5);
        }

        .btn-login {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(120deg, #58a6ff 0%, #6c5ce7 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(88, 166, 255, 0.4);
            font-family: 'Poppins', sans-serif;
            min-height: 44px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(88, 166, 255, 0.6);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 15px 16px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
        }

        .alert.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #86efac;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(88, 166, 255, 0.2);
        }

        .login-footer p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .login-footer a {
            color: #58a6ff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-footer a:hover {
            color: #9370db;
            text-decoration: underline;
        }

        .show-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            user-select: none;
            transition: all 0.3s ease;
            min-height: 44px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .show-password:hover {
            color: #58a6ff;
        }

        .password-wrapper {
            position: relative;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            display: inline-block;
            width: 48px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(88, 166, 255, 0.3), transparent);
            margin: 0 10px;
            vertical-align: middle;
        }

        /* Mobile Responsive */
        @media (max-width: 640px) {
            .login-card {
                padding: 30px;
                border-radius: 15px;
            }

            .login-title {
                font-size: 1.5rem;
            }

            .login-icon {
                font-size: 2.5rem;
            }

            .form-input {
                padding: 12px 14px;
                font-size: 16px;
            }

            .btn-login {
                padding: 12px 16px;
                font-size: 1rem;
            }

            .login-container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="login-icon">🔐</div>
                <h1 class="login-title">Admin Login</h1>
                <p class="login-subtitle">เข้าสู่ระบบจัดการบอท Discord</p>
            </div>

            <!-- Alert -->
            <div id="alert" class="alert"></div>

            <!-- Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        class="form-input" 
                        placeholder="ป้อน username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input" 
                            placeholder="ป้อน password"
                            required
                        >
                        <span class="show-password" id="togglePassword" title="แสดง/ซ่อน">👁️</span>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <span id="btnText">เข้าสู่ระบบ</span>
                    <span id="spinner" class="loading-spinner" style="display: none;"></span>
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p>🎉 ยินดีต้อนรับแอดมิน!</p>
                <p style="margin-top: 10px; font-size: 0.85rem;">
                    <a href="/">← กลับไปหน้าแรก</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const alertDiv = document.getElementById('alert');
        const togglePasswordBtn = document.getElementById('togglePassword');

        // Toggle show/hide password
        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePasswordBtn.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        });

        // Show alert
        function showAlert(message, type) {
            alertDiv.textContent = message;
            alertDiv.className = `alert ${type}`;
            alertDiv.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 1500);
            }
        }

        // Handle login
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = usernameInput.value;
            const password = passwordInput.value;

            if (!username || !password) {
                showAlert('❌ กรุณากรอก username และ password', 'error');
                return;
            }

            // Show loading
            document.getElementById('btnText').style.display = 'none';
            document.getElementById('spinner').style.display = 'inline-block';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    // เก็บ token ใน localStorage
                    localStorage.setItem('authToken', data.token);
                    showAlert('✅ เข้าสู่ระบบสำเร็จ!', 'success');
                } else {
                    showAlert('❌ ' + (data.error || 'Username หรือ password ไม่ถูกต้อง'), 'error');
                    // Reset button
                    document.getElementById('btnText').style.display = 'inline';
                    document.getElementById('spinner').style.display = 'none';
                }
            } catch (error) {
                showAlert('❌ เกิดข้อผิดพลาด: ' + error.message, 'error');
                document.getElementById('btnText').style.display = 'inline';
                document.getElementById('spinner').style.display = 'none';
            }
        });

        // Auto-focus on username
        window.addEventListener('load', () => {
            usernameInput.focus();
        });

        // Enter key to submit
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
